version: '3.8'

services:
  jarimatika-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarimatika-app
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    volumes:
      - ./logs:/app/logs
      - ./model:/app/model
      - ./assets:/app/assets
    restart: unless-stopped
    networks:
      - jarimatika-network

networks:
  jarimatika-network:
    driver: bridge